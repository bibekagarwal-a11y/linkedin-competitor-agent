name: Competitor Monitoring Agent

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        run: python scripts/collect_posts.py

      - name: Generate daily summary
        run: python scripts/summarize_daily.py

      - name: Generate weekly summary
        run: python scripts/summarize_weekly.py

      - name: Generate monthly summary
        run: python scripts/summarize_monthly.py

      - name: Analyze competitor signals
        run: python scripts/analyze_signals.py

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update summaries" || echo "no changes"
          git push
