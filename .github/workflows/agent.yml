name: Competitor Intelligence

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 feedparser

      - name: Collect LinkedIn signals
        run: python scripts/collect_linkedin.py

      - name: Collect blog posts
        run: python scripts/collect_blog_posts.py

      - name: Collect press releases
        run: python scripts/collect_press_releases.py

      - name: Generate weekly report
        run: python scripts/generate_weekly_brief.py

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update weekly report" || echo "no changes"
          git push
