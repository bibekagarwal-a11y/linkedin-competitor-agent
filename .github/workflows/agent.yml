name: Competitor Monitoring Agent

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Run collector
        run: python scripts/collect_posts.py

      - name: Generate daily summary
        run: python scripts/summarize_daily.py

      - name: Generate weekly summary
        run: python scripts/summarize_weekly.py

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update summaries"
          git push
