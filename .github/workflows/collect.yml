name: Collect competitor signals

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect normalized source items
        run: |
          python scripts/collect_sources.py
        env:
          PYTHONPATH: scripts

      - name: Cluster canonical events
        run: |
          python scripts/cluster_events.py
        env:
          PYTHONPATH: scripts

      - name: Commit data updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "update collected competitor data" || echo "no changes"
          git push
