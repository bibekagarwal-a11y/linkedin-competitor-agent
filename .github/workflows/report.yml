name: Generate weekly competitor report

on:
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild canonical events
        run: |
          python scripts/cluster_events.py
        env:
          PYTHONPATH: scripts

      - name: Generate weekly report
        run: |
          python scripts/generate_weekly_report.py
        env:
          PYTHONPATH: scripts

      - name: Commit weekly report
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add reports/ data/canonical_events.json
          git commit -m "update weekly competitor report" || echo "no changes"
          git push
