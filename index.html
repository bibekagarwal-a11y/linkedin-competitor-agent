<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Energy Software Competitor Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
    font-family: Arial;
    margin:40px;
    background:#f5f7fb;
}

h1{
    color:#1f2937;
}

.section{
    background:white;
    padding:20px;
    margin-bottom:30px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<h1>Energy Software Competitor Dashboard</h1>

<div class="section">
<h2>Daily Summary</h2>
<div id="daily"></div>
</div>

<div class="section">
<h2>Weekly Summary</h2>
<div id="weekly"></div>
</div>

<div class="section">
<h2>Monthly Summary</h2>
<div id="monthly"></div>
</div>

<script>

async function loadMarkdown(file, elementId) {

    const response = await fetch(file);
    const text = await response.text();

    document.getElementById(elementId).innerHTML =
        marked.parse(text);
}

loadMarkdown("daily_summary.md","daily");
loadMarkdown("weekly_summary.md","weekly");
loadMarkdown("monthly_summary.md","monthly");

</script>

</body>
</html>
