<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Energy Competitor Radar</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
    font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
    background:#f5f7fb;
    margin:0;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:40px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    border-radius:10px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card h2{
    margin-top:0;
}

</style>

</head>

<body>

<h1>Energy Software Competitor Radar</h1>

<div class="container">

<div class="card">
<h2>Daily Activity</h2>
<div id="daily"></div>
</div>

<div class="card">
<h2>Weekly Activity</h2>
<div id="weekly"></div>
</div>

<div class="card">
<h2>Monthly Activity</h2>
<div id="monthly"></div>
</div>

</div>

<script>

async function loadMarkdown(file, elementId){

    const response = await fetch(file);
    const text = await response.text();

    document.getElementById(elementId).innerHTML = marked.parse(text);
}

loadMarkdown("daily_summary.md","daily");
loadMarkdown("weekly_summary.md","weekly");
loadMarkdown("monthly_summary.md","monthly");

</script>

</body>
</html>
