<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Competitor Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
    font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
    background:#f5f7fb;
    margin:0;
    padding:50px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

h1{
    margin-top:0;
}

h2{
    margin-top:30px;
}

ul{
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Energy Trading Software – Competitor Intelligence</h1>

<div id="report"></div>

</div>

<script>

async function loadReport(){

    const response = await fetch("weekly_summary.md");
    const text = await response.text();

    document.getElementById("report").innerHTML =
        marked.parse(text);
}

loadReport();

</script>

</body>
</html>
